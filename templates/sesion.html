<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Allen · {{ sesion[1] }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #fff; color: #111; }
    nav { display: flex; align-items: center; justify-content: space-between;
          padding: 20px 32px; border-bottom: 0.5px solid #f0f0f0; }
    .logo { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: #111; }
    .logo span { color: #999; font-weight: 300; }
    .nav-links { display: flex; gap: 20px; }
    .nav-links a { font-size: 11px; color: #bbb; text-decoration: none; letter-spacing: .04em; }
    .main { max-width: 720px; margin: 0 auto; padding: 40px 24px; }
    .top-row { display: flex; align-items: flex-start; justify-content: space-between;
               margin-bottom: 32px; gap: 20px; }
    h1 { font-size: 28px; font-weight: 500; letter-spacing: -.02em; margin-bottom: 4px; }
    .meta { font-size: 12px; color: #bbb; }
    .link-box { background: #f5f5f5; border-radius: 8px; padding: 14px 16px;
                display: flex; flex-direction: column; gap: 8px; min-width: 220px; }
    .link-label { font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: #bbb; }
    .link-val { font-size: 11px; color: #555; font-family: monospace; word-break: break-all; }
    .btn-copy { background: #111; color: #fff; border: none; border-radius: 5px;
                padding: 7px 12px; font-size: 11px; font-family: 'Inter', sans-serif;
                cursor: pointer; letter-spacing: .04em; align-self: flex-start; }
    .section-label { font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
                     color: #ccc; margin-bottom: 12px; }
    .upload-area { border: 0.5px dashed #ccc; border-radius: 8px; padding: 32px;
                   text-align: center; color: #ccc; font-size: 13px;
                   margin-bottom: 24px; cursor: pointer; transition: border-color .15s; }
    .upload-area:hover { border-color: #aaa; color: #aaa; }
    .upload-area input { display: none; }
    .upload-icon { font-size: 28px; margin-bottom: 8px; }
    .btn-subir { background: #111; color: #fff; border: none; border-radius: 6px;
                 padding: 10px 20px; font-size: 12px; font-family: 'Inter', sans-serif;
                 cursor: pointer; letter-spacing: .04em; margin-bottom: 32px; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .thumb { aspect-ratio: 1; border-radius: 6px; overflow: hidden; background: #f0f0f0; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .empty-fotos { color: #ccc; font-size: 13px; text-align: center; padding: 32px 0; }
    .thumb {
      position: relative;
      aspect-ratio: 1;
      border-radius: 6px;
      overflow: hidden;
      background: #f0f0f0;
    }

    .thumb img {
     width: 100%;
     height: 100%;
     object-fit: cover;
     display: block;
    }

    .thumb form {
     position: absolute;
     top: 4px;
     right: 4px;
     z-index: 100;
    }

    .btn-del {
     width: 24px;
     height: 24px;
     border: none;
     border-radius: 50%;
     background: rgba(0,0,0,.8);
     color: white;
     cursor: pointer;
     font-size: 12px;
    display: none;
    }

    .thumb:hover .btn-del {
      display: block;
    }
  </style>
</head>
<body>
  <nav>
    <div class="logo">Allen <span>/ sesión</span></div>
    <div class="nav-links">
      <a href="/panel">← Panel</a>
      <a href="/salir">Salir</a>
    </div>
  </nav>

  <div class="main">
    <div class="top-row">
      <div>
        <h1>{{ sesion[1] }}</h1>
        <p class="meta">{{ sesion[2] }} · {{ sesion[3] }} · {{ fotos|length }} fotos</p>
      </div>
      <div class="link-box">
        <div class="link-label">Link del cliente</div>
        <div class="link-val" id="linkval">
          {{ request.host_url }}g/{{ sesion[4] }}
        </div>
        <button class="btn-copy" onclick="copiarLink()">Copiar link</button>
      </div>
    </div>

    <div class="section-label">Subir fotos</div>
    <form method="POST" action="/subir/{{ sesion[0] }}" enctype="multipart/form-data">
      <label class="upload-area" for="fotos">
        <div class="upload-icon">↑</div>
        <div id="upload-label">Haz clic para seleccionar fotos</div>
        <input type="file" name="fotos" id="fotos" multiple accept="image/*"
               onchange="mostrarCantidad(this)">
      </label>
      <button class="btn-subir" type="submit">Subir fotos →</button>
    </form>

    <div class="section-label">Fotos subidas</div>
    {% if fotos %}
      <div class="grid">
        {% for f in fotos %}
        <div class="thumb">
         <img src="/static/uploads/{{ f[2] }}" alt="foto">
         <form method="POST" action="/borrar-foto/{{ f[0] }}/{{ sesion[0] }}"
             onsubmit="return confirm('¿Borrar esta foto?')">
               <button class="btn-del" type="submit">✕</button>
             </form>
           </div>
          {% endfor %}
       </div>
    {% else %}
      <div class="empty-fotos">Aún no hay fotos en esta sesión.</div>
    {% endif %}
  </div>

  <script>
    function copiarLink() {
      const txt = document.getElementById('linkval').innerText.trim();
      navigator.clipboard.writeText(txt);
      event.target.textContent = '✓ Copiado';
      setTimeout(() => event.target.textContent = 'Copiar link', 2000);
    }
    function mostrarCantidad(input) {
      const n = input.files.length;
      document.getElementById('upload-label').textContent =
        n + (n === 1 ? ' foto seleccionada' : ' fotos seleccionadas');
    }
  </script>
</body>
</html>
