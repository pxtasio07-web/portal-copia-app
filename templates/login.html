<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Allen · Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #fff;
           min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { width: 100%; max-width: 360px; padding: 0 24px; }
    .logo { font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
            color: #999; margin-bottom: 40px; }
    h1 { font-size: 40px; font-weight: 500; color: #111;
         letter-spacing: -.02em; line-height: 1.05; margin-bottom: 8px; }
    .sub { font-size: 13px; color: #bbb; margin-bottom: 36px; }
    .field { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
    input { border: 0.5px solid #ddd; border-radius: 6px; padding: 11px 14px;
            font-size: 13px; font-family: 'Inter', sans-serif; color: #111;
            outline: none; transition: border-color .15s; }
    input:focus { border-color: #111; }
    input::placeholder { color: #ccc; }
    button { width: 100%; background: #111; color: #fff; border: none;
             border-radius: 6px; padding: 12px; font-size: 13px;
             font-family: 'Inter', sans-serif; cursor: pointer;
             letter-spacing: .04em; margin-top: 8px;
             display: flex; align-items: center; justify-content: space-between; }
    .arrow { opacity: .5; font-size: 18px; }
    .error { font-size: 12px; color: #e55; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Allen / fotografía</div>
    <h1>Acceso<br>privado.</h1>
    <p class="sub">Solo para el administrador</p>
    <form method="POST">
      <div class="field">
        <input type="text" name="usuario" placeholder="usuario" required>
        <input type="password" name="password" placeholder="contraseña" required>
      </div>
      <button type="submit">Entrar <span class="arrow">→</span></button>
      {% if error %}
        <p class="error">{{ error }}</p>
      {% endif %}
    </form>
  </div>
</body>
</html>
